<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fcfcfd"/>

  <text x="64" y="76" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="2" font-weight="600">USE CASES / 6パターン</text>
  <text x="64" y="116" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="700" fill="#1a1a1f" letter-spacing="-0.01em">業務領域別ユースケース</text>
  <line x1="64" y1="148" x2="1216" y2="148" stroke="#e5e5ea"/>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64"  y="200" width="384" height="200" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="84"  y="232" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 01</text>
    <text x="84"  y="266" font-size="20" font-weight="700" fill="#1a1a1f">SNS マーケティング</text>
    <line x1="84" y1="288" x2="428" y2="288" stroke="#e5e5ea"/>
    <text x="84"  y="316" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="84"  y="338" font-size="13" fill="#1a1a1f">役割「SNS集客サポート」</text>
    <text x="84"  y="358" font-size="13" fill="#1a1a1f">+ 自動タスク + X 連携</text>
    <text x="84"  y="386" font-size="11" fill="#5a5a66">投稿 / 分析 / 競合監視</text>

    <rect x="464" y="200" width="384" height="200" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="484" y="232" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 02</text>
    <text x="484" y="266" font-size="20" font-weight="700" fill="#1a1a1f">営業・リード獲得</text>
    <line x1="484" y1="288" x2="828" y2="288" stroke="#e5e5ea"/>
    <text x="484" y="316" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="484" y="338" font-size="13" fill="#1a1a1f">カテゴリ「営業資料」</text>
    <text x="484" y="358" font-size="13" fill="#1a1a1f">+ Notion 連携</text>
    <text x="484" y="386" font-size="11" fill="#5a5a66">リスト / リサーチ / 提案書</text>

    <rect x="864" y="200" width="352" height="200" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="884" y="232" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 03</text>
    <text x="884" y="266" font-size="20" font-weight="700" fill="#1a1a1f">業務・事務効率化</text>
    <line x1="884" y1="288" x2="1196" y2="288" stroke="#e5e5ea"/>
    <text x="884" y="316" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="884" y="338" font-size="13" fill="#1a1a1f">役割「契約書ドラフト」</text>
    <text x="884" y="358" font-size="13" fill="#1a1a1f">+ Googleドライブ 連携</text>
    <text x="884" y="386" font-size="11" fill="#5a5a66">契約書 / 社内通知 / 整理</text>

    <rect x="64"  y="424" width="384" height="200" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="84"  y="456" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 04</text>
    <text x="84"  y="490" font-size="20" font-weight="700" fill="#1a1a1f">スケジュール管理</text>
    <line x1="84" y1="512" x2="428" y2="512" stroke="#e5e5ea"/>
    <text x="84"  y="540" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="84"  y="562" font-size="13" fill="#1a1a1f">Googleカレンダー 連携</text>
    <text x="84"  y="582" font-size="13" fill="#1a1a1f">+ LINE + 朝のブリーフィング</text>
    <text x="84"  y="610" font-size="11" fill="#5a5a66">確認 / 追加 / リマインダー</text>

    <rect x="464" y="424" width="384" height="200" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="484" y="456" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 05</text>
    <text x="484" y="490" font-size="20" font-weight="700" fill="#1a1a1f">チームコラボ</text>
    <line x1="484" y1="512" x2="828" y2="512" stroke="#e5e5ea"/>
    <text x="484" y="540" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="484" y="562" font-size="13" fill="#1a1a1f">Slack 連携 + Notion 連携</text>
    <text x="484" y="582" font-size="13" fill="#1a1a1f">+ 役割「Notionタスク管理」</text>
    <text x="484" y="610" font-size="11" fill="#5a5a66">指示 / 議事録 / 通知</text>

    <rect x="864" y="424" width="352" height="200" rx="8" fill="#ffffff" stroke="#5b6cff" stroke-width="1.4"/>
    <text x="884" y="456" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">USE CASE 06 / 業界特化</text>
    <text x="884" y="490" font-size="20" font-weight="700" fill="#1a1a1f">医療 / 製造</text>
    <line x1="884" y1="512" x2="1196" y2="512" stroke="#e5e5ea"/>
    <text x="884" y="540" font-size="11" fill="#5a5a66" letter-spacing="1">USE</text>
    <text x="884" y="562" font-size="13" fill="#1a1a1f">カテゴリ「医療・福祉向け」</text>
    <text x="884" y="582" font-size="13" fill="#1a1a1f">「製造・メーカー向け」</text>
    <text x="884" y="610" font-size="11" fill="#5a5a66">シフト / 品質管理 / マニュアル</text>
  </g>

  <text x="64" y="690" font-family="Inter, system-ui, sans-serif" font-size="12"
        fill="#5a5a66">設計の5問: 何を / どこから / どのデータで / いつ / どこに通知</text>
</svg>
