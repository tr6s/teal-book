<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fcfcfd"/>

  <text x="64" y="76" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="2" font-weight="600">ROLE / 作成と利用</text>
  <text x="64" y="116" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="700" fill="#1a1a1f" letter-spacing="-0.01em">役割の作成フローと使用例</text>
  <line x1="64" y1="148" x2="1216" y2="148" stroke="#e5e5ea"/>

  <text x="64" y="200" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="1.5" font-weight="600">CREATE FLOW / 3 STEPS</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64"  y="220" width="280" height="160" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="84"  y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">STEP 1</text>
    <text x="84"  y="284" font-size="16" font-weight="700" fill="#1a1a1f">新規作成</text>
    <line x1="84" y1="304" x2="324" y2="304" stroke="#e5e5ea"/>
    <text x="84"  y="332" font-size="12" fill="#5a5a66">サイドバー → 役割</text>
    <text x="84"  y="352" font-size="12" fill="#5a5a66">「+ 新しい役割」をタップ</text>

    <rect x="368" y="220" width="280" height="160" rx="8" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="388" y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">STEP 2</text>
    <text x="388" y="284" font-size="16" font-weight="700" fill="#1a1a1f">指示文を書く</text>
    <line x1="388" y1="304" x2="628" y2="304" stroke="#e5e5ea"/>
    <text x="388" y="332" font-size="12" fill="#5a5a66">対象 / 成果物 / 制約</text>
    <text x="388" y="352" font-size="12" fill="#5a5a66">5〜10行から始める</text>

    <rect x="672" y="220" width="280" height="160" rx="8" fill="#ffffff" stroke="#5b6cff" stroke-width="1.4"/>
    <text x="692" y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.2">STEP 3</text>
    <text x="692" y="284" font-size="16" font-weight="700" fill="#1a1a1f">保存して呼び出し</text>
    <line x1="692" y1="304" x2="932" y2="304" stroke="#e5e5ea"/>
    <text x="692" y="332" font-size="12" fill="#5a5a66">サイドバー一覧から</text>
    <text x="692" y="352" font-size="12" fill="#5a5a66">ワンタップで再開</text>

    <rect x="976" y="220" width="240" height="160" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-dasharray="4 4"/>
    <text x="996" y="252" font-size="12" font-weight="600" fill="#5a5a66" letter-spacing="1.2">OPTIONAL</text>
    <text x="996" y="284" font-size="16" font-weight="700" fill="#1a1a1f">自動タスクと紐づけ</text>
    <line x1="996" y1="304" x2="1196" y2="304" stroke="#e5e5ea"/>
    <text x="996" y="332" font-size="12" fill="#5a5a66">第08章で扱います</text>
    <text x="996" y="352" font-size="12" fill="#5a5a66">定期実行 / 通知</text>
  </g>

  <g stroke="#1a1a1f" stroke-width="1">
    <line x1="344" y1="300" x2="368" y2="300"/>
    <line x1="648" y1="300" x2="672" y2="300"/>
    <line x1="952" y1="300" x2="976" y2="300" stroke-dasharray="2 3"/>
  </g>

  <line x1="64" y1="420" x2="1216" y2="420" stroke="#e5e5ea"/>
  <text x="64" y="464" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="1.5" font-weight="600">USE CASES / 役割の例</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64"  y="488" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="84"  y="516" font-size="14" font-weight="700" fill="#1a1a1f">SNS集客サポート</text>
    <text x="84"  y="540" font-size="11" fill="#5a5a66">SNS 戦略 / 投稿文 / ハッシュタグ提案</text>

    <rect x="456" y="488" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="476" y="516" font-size="14" font-weight="700" fill="#1a1a1f">契約書ドラフト作成</text>
    <text x="476" y="540" font-size="11" fill="#5a5a66">条項提案 / リスク観点 / フォーマット統一</text>

    <rect x="848" y="488" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="868" y="516" font-size="14" font-weight="700" fill="#1a1a1f">営業リスト作成</text>
    <text x="868" y="540" font-size="11" fill="#5a5a66">条件に合う見込み先リストを自動生成</text>

    <rect x="64"  y="580" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="84"  y="608" font-size="14" font-weight="700" fill="#1a1a1f">プレゼン資料作成</text>
    <text x="84"  y="632" font-size="11" fill="#5a5a66">スライド構成提案 / 原稿作成</text>

    <rect x="456" y="580" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="476" y="608" font-size="14" font-weight="700" fill="#1a1a1f">Notionタスク管理</text>
    <text x="476" y="632" font-size="11" fill="#5a5a66">Notion DB と連携したタスク管理</text>

    <rect x="848" y="580" width="368" height="72" rx="6" fill="#ffffff" stroke="#e5e5ea"/>
    <text x="868" y="608" font-size="14" font-weight="700" fill="#1a1a1f">資金調達戦略立案</text>
    <text x="868" y="632" font-size="11" fill="#5a5a66">投資家向け資料のアドバイス</text>
  </g>
</svg>
