<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <rect width="1280" height="640" fill="#fcfcfd"/>

  <text x="64" y="76" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="2" font-weight="600">QUICKSTART / 5 STEPS</text>
  <text x="64" y="116" font-family="Inter, system-ui, sans-serif" font-size="28"
        font-weight="700" fill="#1a1a1f" letter-spacing="-0.01em">5分で始めるための5ステップ</text>
  <line x1="64" y1="148" x2="1216" y2="148" stroke="#e5e5ea" stroke-width="1"/>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="64"   y="220" width="216" height="220" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="84"   y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.5">STEP 1</text>
    <text x="84"   y="284" font-size="16" font-weight="700" fill="#1a1a1f">アカウント作成</text>
    <line x1="84"  y1="304" x2="260" y2="304" stroke="#e5e5ea"/>
    <text x="84"   y="332" font-size="12" fill="#5a5a66">teal-me.io を開く</text>
    <text x="84"   y="354" font-size="12" fill="#5a5a66">メール / Google で</text>
    <text x="84"   y="372" font-size="12" fill="#5a5a66">サインアップ</text>
    <text x="84"   y="408" font-size="11" fill="#5a5a66" letter-spacing="1">~ 1 min</text>

    <rect x="304"  y="220" width="216" height="220" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="324"  y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.5">STEP 2</text>
    <text x="324"  y="284" font-size="16" font-weight="700" fill="#1a1a1f">LINE 友だち追加</text>
    <line x1="324" y1="304" x2="500" y2="304" stroke="#e5e5ea"/>
    <text x="324"  y="332" font-size="12" fill="#5a5a66">外部連携 → LINE</text>
    <text x="324"  y="354" font-size="12" fill="#5a5a66">QR コードを読み取り</text>
    <text x="324"  y="372" font-size="12" fill="#5a5a66">公式アカウント追加</text>
    <text x="324"  y="408" font-size="11" fill="#5a5a66" letter-spacing="1">~ 1 min</text>

    <rect x="544"  y="220" width="216" height="220" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="564"  y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.5">STEP 3</text>
    <text x="564"  y="284" font-size="16" font-weight="700" fill="#1a1a1f">アカウント連携</text>
    <line x1="564" y1="304" x2="740" y2="304" stroke="#e5e5ea"/>
    <text x="564"  y="332" font-size="12" fill="#5a5a66">案内メッセージから</text>
    <text x="564"  y="354" font-size="12" fill="#5a5a66">ログインを完了</text>
    <text x="564"  y="372" font-size="12" fill="#5a5a66">LINE と Web を紐づけ</text>
    <text x="564"  y="408" font-size="11" fill="#5a5a66" letter-spacing="1">~ 1 min</text>

    <rect x="784"  y="220" width="216" height="220" rx="8" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="804"  y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.5">STEP 4</text>
    <text x="804"  y="284" font-size="16" font-weight="700" fill="#1a1a1f">最初の会話</text>
    <line x1="804" y1="304" x2="980" y2="304" stroke="#e5e5ea"/>
    <text x="804"  y="332" font-size="12" fill="#5a5a66">LINE に自由に話す</text>
    <text x="804"  y="354" font-size="12" fill="#5a5a66">AI が応答する</text>
    <text x="804"  y="372" font-size="12" fill="#5a5a66">連携依頼は後回し可</text>
    <text x="804"  y="408" font-size="11" fill="#5a5a66" letter-spacing="1">~ 1 min</text>

    <rect x="1024" y="220" width="192" height="220" rx="8" fill="#ffffff" stroke="#5b6cff" stroke-width="1.4"/>
    <text x="1044" y="252" font-size="12" font-weight="600" fill="#5b6cff" letter-spacing="1.5">STEP 5</text>
    <text x="1044" y="284" font-size="16" font-weight="700" fill="#1a1a1f">カテゴリ起動</text>
    <line x1="1044" y1="304" x2="1196" y2="304" stroke="#e5e5ea"/>
    <text x="1044" y="332" font-size="12" fill="#5a5a66">「○○のカテゴリで</text>
    <text x="1044" y="354" font-size="12" fill="#5a5a66">  始めたい」と送信</text>
    <text x="1044" y="372" font-size="12" fill="#5a5a66">テンプレが起動</text>
    <text x="1044" y="408" font-size="11" fill="#5a5a66" letter-spacing="1">~ 1 min</text>
  </g>

  <g stroke="#1a1a1f" stroke-width="1">
    <line x1="280" y1="330" x2="304" y2="330"/>
    <line x1="520" y1="330" x2="544" y2="330"/>
    <line x1="760" y1="330" x2="784" y2="330"/>
    <line x1="1000" y1="330" x2="1024" y2="330"/>
  </g>

  <line x1="64" y1="500" x2="1216" y2="500" stroke="#e5e5ea" stroke-width="1"/>
  <text x="64" y="540" font-family="Inter, system-ui, sans-serif" font-size="11"
        fill="#5a5a66" letter-spacing="2" font-weight="600">TOTAL</text>
  <text x="64" y="572" font-family="Inter, system-ui, sans-serif" font-size="22"
        font-weight="700" fill="#1a1a1f">合計 約5分</text>
  <text x="64" y="600" font-family="Inter, system-ui, sans-serif" font-size="13"
        fill="#5a5a66">画面の表示は変わることがあります。最新の手順は公式サイトの案内に従ってください。</text>
</svg>
